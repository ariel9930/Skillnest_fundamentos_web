<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Ariel faundez">
    <title>Ejemplo mini - sitio con inline-block</title>
    <!--Link css-->
<link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <!--HEADER-->
    <header class="header">
        <h1>Mi sitio web</h1>
        <nav class="menu"> <!--Menu navegación-->
            <a href="#" class="boton">Inicio</a>
            <a href="#" class="boton">Servicios</a>
            <a href="#" class="boton">Contacto</a>
        </nav>
    </header>
    <main class="contenedor_principal">
        <!-- Texto con elementos inline-->
        <section>
            <h2>Texto con elementos inline</h2>
            <p>Este es un ejemplo en donde usamos <spam class="resaltado">inline</spam>para resaltar 
               texto sin romper la linea de parrafo.
            </p>
        </section>
        <!-- Tarjetas (inline block) -->
        <section class="contenedor_tarjetas">
            <h2>Tarjetas (inline - block)</h2>
            <div class="box">Tarjeta 1</div>
            <div class="box">Tarjeta 2</div>
            <div class="box">Tarjeta 3</div>
        </section>
        <!-- Bloques (block)-->
        <section>
            <h2>Bloques (block)</h2>
            <div class="bloque">bloque1</bloque>
            <div class="bloque">bloque2</bloque>
            <div class="bloque">bloque3</bloque>
        </section>
    </main>
    <!--Footer-->
    <footer class="footer">
        <p>2026 - Todos los derechos reservados</p>
    </footer>
</body>
</html>
