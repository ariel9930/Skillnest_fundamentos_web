<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="Author" content="Ariel faundez">
    <title>pagina_de_perfil</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
    <header class="Titulo">
        <h1>Perfil</h1>
        <nav class="navbar Titulo">
            <a href="#">Inicio</a>
            <a href="#">Mi perfil</a>
            <a href="#">Conexiones</a>
            <button class="boton">Cerrar sesión</button>
        </nav>
    </header>
    <main class="Principio">
        <section class="jane">
            <div class="imagen azul">
                <img src="static/images/images.jfif" alt="Chicharito">
            </div>
            <div class="titulos">
                <h1>Jane Doe</h1>
                <h2>Bergen, Noruega</h2>
                <p>Desarrolladora Frontend
                    <br>Conocimientos en HTML, CSS, JavaScript
                </p>
                <a href="#">⚙️ Editar perfil</a>
            </div>
        </section>

        <section class="ultimo">
            <div class="solicitudes">
                <div class="minititulos">
                    <h2>Solicitudes de conexión</h2>
                    <button class="votton">Ver todas</button>
                </div>
                <div class="Usuarios">
                    <img src="static/images/images.jfif" alt="chicharito">
                    <div class="between">
                        <p>Steve Jobs</p>
                        
                        <button class="Acep">✔</button>
                        <button class="rech">X</button>
                        </div>
                    </div>
                    <div class="Usuarios">
                        <img src="static/images/images.jfif" alt="chicharito">
                        <p>Bill Gates</p>
                        <button class="Acep">✔</button>
                        <button class="rech">X</button>
                    </div>
                </div>

                <div class="Conexiones">
                    <div class="PP">
                    <h2>Tus conexiones</h2>
                    <button class="votton">Ver todas</button>
                    </div>
                    <p>Richard Stallman</p>
                    <p>Linus Torvalds</p>
                    <p>Ada Lovelace</p>
                    <p>Grace Hopper</p>
                </div>
        </section>
    </main>
</body>

</html>
